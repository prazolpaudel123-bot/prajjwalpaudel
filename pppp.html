<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name | Civil Engineer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 8px;
        }

        p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .socials a {
            text-decoration: none;
            color: white;
            margin: 0 12px;
            font-size: 22px;
            transition: 0.3s;
        }

        .socials a:hover {
            color: #ffd369;
            transform: scale(1.3);
        }

        .buttons {
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            margin: 8px;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            border: 1px solid white;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            color: #764ba2;
        }

        footer {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- Profile Image -->
        <img src="profile.jpg" alt="Profile Photo" class="profile-img">

        <h1>Prajjwal Paudel</h1>
        <p>
            Civil Engineer <br>
            MSc in Infrastructure Engineering & Management
        </p>

        <!-- Social Links with Real Icons -->
        <div class="socials">
            <a href="https://linkedin.com/in/prajjwal-paudel-8447ab373/" target="_blank">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="https://facebook.com/profile.php?id=61585044377315" target="_blank">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="https://instagram.com/prajjwal_paudel8?igsh=NXc4Nm15amFka3Z2" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
			<a href="https://youtube.com/@Er_Prajjwal_Paudel" target="_blank">
                <i class="fab fa-youtube"></i>
            </a>
        </div>

        <!-- Download Buttons -->
        <div class="buttons">
            <a href="prazolcv.pdf" class="btn" download>Download CV</a>
            <a href="resume.pdf" class="btn" download>Download Resume</a>
        </div>

        <footer>
            © 2020 Prajjwal Paudel
        </footer>
    </div>

</body>
</html>
